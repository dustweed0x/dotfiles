#!/usr/bin/env bash
# ==============================================================================
# DOTFILES CONFIGURATION
# Archivo central parametrizado para la instalación y despliegue de dotfiles.
# ==============================================================================

# 1. PAQUETES DEL SISTEMA (Se instalarán usando apt/dnf/yum según el SO)
# Se han incluido utilidades core mencionadas: tree, duf, fd-find y ripgrep.
SYSTEM_PACKAGES=(
    "zsh"
    "git"
    "curl"
    "wget"
    "unzip"
    "jq"
    "tar"
    "tree"
    "duf"
    "fd-find"
    "ripgrep"
    "chafa"
    "python3-pip"
)

# 2. BINARIOS MANUALES (Formato -> "nombre_herramienta|usuario_github/repositorio")
# El instalador consultará la API de GitHub para bajar siempre la última versión y mostrará la descripción.
BINARIES=(
    "zellij|zellij-org/zellij|Multiplexor de terminal moderno y colaborativo."
    "starship|starship/starship|El prompt más rápido y personalizable para tu shell."
    "yazi|sxyazi/yazi|Explorador de archivos de terminal con interfaz de usuario moderna."
    "fastfetch|fastfetch-cli/fastfetch|Herramienta de información del sistema rápida y personalizable."
    "bat|sharkdp/bat|Un 'cat' con esteroides, con resaltado de sintaxis y números de línea."
    "eza|eza-community/eza|Un 'ls' moderno y mejorado, con iconos y colores."
    "zoxide|ajeetdsouza/zoxide|Navegación de directorios más inteligente con historial."
    "redial|taypo/redial|Herramienta para reconectar automáticamente a sesiones SSH."
    "fzf|junegunn/fzf|Buscador difuso de archivos y comandos increíblemente rápido."
)

# 3. REPOSITORIOS GIT DIRECTOS (Frameworks, Plugins, Temas)
# Formato -> "ruta_destino_absoluta|usuario_github/repositorio"
# Nota: La instalación manual oficial de Oh My Zsh es un simple git clone.
GIT_CLONES=(
    "$HOME/.oh-my-zsh|ohmyzsh/ohmyzsh"
    "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions|zsh-users/zsh-autosuggestions"
    "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting|zsh-users/zsh-syntax-highlighting"
)

# 4. ENLACES SIMBÓLICOS (Formato -> "ruta_relativa_en_repo|ruta_absoluta_destino")
# El instalador iterará sobre esta lista para hacer los respaldos y crear los symlinks.
SYMLINKS=(
    "configs/zsh/zshrc|$HOME/.zshrc"
    "configs/zellij/config.kdl|$HOME/.config/zellij/config.kdl"
    "configs/zellij/layouts/bitcooking.kdl|$HOME/.config/zellij/layouts/bitcooking.kdl"
    "configs/starship/starship.toml|$HOME/.config/starship.toml"
    "configs/fastfetch/config.jsonc|$HOME/.config/fastfetch/config.jsonc"
    "configs/fastfetch/bitcoin_logo.txt|$HOME/.config/fastfetch/bitcoin_logo.txt"
    "configs/yazi/theme.toml|$HOME/.config/yazi/theme.toml"
    "configs/ssh/config|$HOME/.ssh/config"
    "configs/vscode/settings.json|$HOME/.vscode-server/data/Machine/settings.json"
    "configs/vscode/keybindings.json|$HOME/.vscode-server/data/Machine/keybindings.json"
)
