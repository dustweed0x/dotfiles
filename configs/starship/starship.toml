"$schema" = 'https://starship.rs/config-schema.json'

# Aumenta el tiempo de espera a 2 segundos (2000 ms) para evitar advertencias
command_timeout = 2000

# ============================================================================
# FORMATO DEL PROMPT (IZQUIERDA Y DERECHA)
# ============================================================================

format = """
[\uE0C5 ](fg:bg_os)\
$os\
[î‚´](bg:bg_session fg:bg_os)\
$username$hostname\
[î‚´](bg:bg_path fg:bg_session)\
$directory\
[î‚´](bg:bg_git fg:bg_path)\
$git_branch\
$git_status\
[î‚´](fg:bg_git)\
$line_break\
$character"""

right_format = """\
$memory_usage\
$battery\
$cmd_duration\
$nodejs\
$python\
$golang\
$docker_context\
$kubernetes\
$aws\
$status"""

# ============================================================================
# PALETA DE COLORES (BASADA EN "LOVELACE")
# ============================================================================

palette = 'lovelace'

[palettes.lovelace]
bg_os      = '#556FFF'   # brightBlue de WT
bg_session = '#8897F4'   # blue de WT
bg_path    = '#C574DD'   # purple de WT
bg_git     = '#79E6F3'   # cyan de WT (unificado para no romper el conector î‚´)
text_dark  = '#282A36'   # black de WT
text_light = '#FDFDFD'   # foreground de WT
success    = '#5ADECD'   # green de WT
error      = '#F37F97'   # red de WT
warning    = '#F2A272'   # yellow de WT
lang_node  = '#5ADECD'   # green de WT
lang_py    = '#F2A272'   # yellow de WT
lang_go    = '#3FDCEE'   # brightCyan de WT
cloud      = '#B043D1'   # brightPurple de WT

# ============================================================================
# Mأ“DULOS DE LA IZQUIERDA
# ============================================================================

[os]
disabled = false
style = "bg:bg_os fg:text_light"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
Macos = "َ°€µ"
Linux = "َ°Œ½"

[username]
show_always = true
style_user = "bg:bg_session fg:text_dark"
style_root = "bg:bg_session fg:error"
format = "[ $user]($style)"

[hostname]
ssh_only = false
style = "bg:bg_session fg:text_dark"
format = "[@$hostname ]($style)"

[sudo]
disabled = false
style = "bg:bg_path fg:error" # Usamos fondo morado para que combine con el bloque del directorio
symbol = "َ°Œ¾ "
format = "[$symbol]($style)"

[directory]
style = "bg:bg_path fg:text_dark"
format = "[ î—¾ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "
"Desktop" = "َ°§¨ "

[git_branch]
symbol = "ïگک"
style = "bg:bg_git fg:text_dark"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:bg_git fg:text_dark"
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
disabled = false
added_style = "bold fg:success bg:bg_git"
deleted_style = "bold fg:error bg:bg_git"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

# ============================================================================
# Mأ“DULOS DE LA DERECHA
# ============================================================================

[cmd_duration]
min_time = 500
style = "fg:warning bg:none"
format = "[ï‰’ $duration ]($style)"

[nodejs]
symbol = "îœک"
style = "fg:lang_node"
format = '[$symbol $version ]($style)'

[python]
symbol = "îˆµ"
style = "fg:lang_py"
format = '[$symbol $version ]($style)'

[golang]
symbol = "îک§"
style = "fg:lang_go"
format = '[$symbol $version ]($style)'

[docker_context]
symbol = "ïŒˆ"
style = "fg:bg_os"
format = '[$symbol $context ]($style)'

[kubernetes]
disabled = false
symbol = "ïƒˆ"
style = "fg:bg_os"
format = '[$symbol $context ]($style)'

[aws]
symbol = "î‍­"
style = "fg:cloud"
format = '[$symbol $profile ]($style)'

[status]
disabled = false
success_symbol = "[ï€Œ](success)"
symbol = "[ï€چ](error)"
format = '[$symbol]($style)'

# ============================================================================
# SALTO DE LأچNEA Y CARأپCTER FINAL
# ============================================================================

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[د€](bold fg:bg_path)'
error_symbol = '[د€](bold fg:error)'
vimcmd_symbol = '[د€](bold fg:success)'

# ============================================================================
# Mأ“DULOS CONDICIONALES (MEMORIA Y BATERأچA INVISIBLES)
# ============================================================================
[memory_usage]
disabled = false
threshold = 80 # Solo aparece si superas el 80% de RAM
style = "bold fg:error bg:none"
format = "[ َ°چ› $ram_pct ]($style)"

[battery]
disabled = false
format = "[ $symbol$percentage ]($style)"

[[battery.display]]
threshold = 20 # Solo aparece si baja del 20%
style = "bold fg:error bg:none"

