"$schema" = 'https://starship.rs/config-schema.json'

# Aumenta el tiempo de espera a 2 segundos (2000 ms) para evitar advertencias
command_timeout = 2000

# ============================================================================
# FORMATO DEL PROMPT (IZQUIERDA Y DERECHA)
# ============================================================================

format = """
[\uE0C5 ](fg:bg_os)\
$os\
[](bg:bg_session fg:bg_os)\
$username$hostname\
[](bg:bg_path fg:bg_session)\
$directory\
[](bg:bg_git fg:bg_path)\
$git_branch\
$git_status\
[](fg:bg_git)\
$line_break\
$character"""

right_format = """\
$memory_usage\
$battery\
$cmd_duration\
$nodejs\
$python\
$golang\
$docker_context\
$kubernetes\
$aws\
$status"""

# ============================================================================
# PALETA DE COLORES
# ============================================================================

palette = 'lovelace'

# ============================================================================
# MÓDULOS DE LA IZQUIERDA
# ============================================================================

[os]
disabled = false
style = "bg:bg_os fg:text_light"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
Macos = "󰀵"
Linux = "󰌽"

[username]
show_always = true
style_user = "bg:bg_session fg:text_dark"
style_root = "bg:bg_session fg:error"
format = "[ $user]($style)"

[hostname]
ssh_only = false
style = "bg:bg_session fg:text_dark"
format = "[@$hostname ]($style)"

[sudo]
disabled = false
style = "bg:bg_path fg:error" # Usamos fondo morado para que combine con el bloque del directorio
symbol = "󰌾 "
format = "[$symbol]($style)"

[directory]
style = "bg:bg_path fg:text_dark"
format = "[  $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"Desktop" = "󰧨 "

[git_branch]
symbol = ""
style = "bg:bg_git fg:text_dark"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:bg_git fg:text_dark"
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
disabled = false
added_style = "bold fg:success bg:bg_git"
deleted_style = "bold fg:error bg:bg_git"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

# ============================================================================
# MÓDULOS DE LA DERECHA
# ============================================================================

[cmd_duration]
min_time = 500
style = "fg:warning bg:none"
format = "[ $duration ]($style)"

[nodejs]
symbol = ""
style = "fg:lang_node"
format = '[$symbol $version ]($style)'

[python]
symbol = ""
style = "fg:lang_py"
format = '[$symbol $version ]($style)'

[golang]
symbol = ""
style = "fg:lang_go"
format = '[$symbol $version ]($style)'

[docker_context]
symbol = ""
style = "fg:bg_os"
format = '[$symbol $context ]($style)'

[kubernetes]
disabled = false
symbol = ""
style = "fg:bg_os"
format = '[$symbol $context ]($style)'

[aws]
symbol = ""
style = "fg:cloud"
format = '[$symbol $profile ]($style)'

[status]
disabled = false
success_symbol = "[](success)"
symbol = "[](error)"
format = '[$symbol]($style)'

# ============================================================================
# SALTO DE LÍNEA Y CARÁCTER FINAL
# ============================================================================

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[π](bold fg:bg_path)'
error_symbol = '[π](bold fg:error)'
vimcmd_symbol = '[π](bold fg:success)'

# ============================================================================
# MÓDULOS CONDICIONALES (MEMORIA Y BATERÍA INVISIBLES)
# ============================================================================
[memory_usage]
disabled = false
threshold = 80 # Solo aparece si superas el 80% de RAM
style = "bold fg:error bg:none"
format = "[ 󰍛 $ram_pct ]($style)"

[battery]
disabled = false
format = "[ $symbol$percentage ]($style)"

[[battery.display]]
threshold = 20 # Solo aparece si baja del 20%
style = "bold fg:error bg:none"

# ============================================================================
# PALETA GENERADA (NO EDITAR MANUALMENTE)
[palettes."lovelace"]
bg_os      = '#556FFF'
bg_session = '#8897F4'
bg_path    = '#C574DD'
bg_git     = '#79E6F3'
text_dark  = '#282A36'
text_light = '#FDFDFD'
success    = '#5ADECD'
error      = '#F37F97'
warning    = '#F2A272'
lang_node  = '#5ADECD'
lang_py    = '#F2A272'
lang_go    = '#3FDCEE'
cloud      = '#B043D1'
